# ============================================================
# PRODUCTION Docker Compose
# Usage: docker-compose up -d
# ============================================================

version: "3.9"

networks:
  app-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

volumes:
  nginx-logs:
    driver: local
  nginx-cache:
    driver: local

services:
  # ── Frontend (React + Nginx) ───────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        VITE_APP_VERSION: ${APP_VERSION:-1.0.0}
        VITE_BUILD_DATE: ${BUILD_DATE}
    image: devops-dashboard:${APP_VERSION:-latest}
    container_name: devops-dashboard-frontend
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
      - "${SSL_PORT:-443}:443"
    volumes:
      - nginx-logs:/var/log/nginx
      - nginx-cache:/var/cache/nginx
      # Mount SSL certs (Let's Encrypt or self-signed)
      - ./ssl:/etc/nginx/ssl:ro
      # Runtime env injection
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
    environment:
      - TZ=${TZ:-UTC}
    networks:
      app-network:
        ipv4_address: 172.20.0.10
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.docker.compose.service=frontend"
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`${DOMAIN:-localhost}`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Watchtower (Auto-update containers) ───────────────────
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_NOTIFICATIONS=email
      - WATCHTOWER_NOTIFICATION_EMAIL_FROM=${SMTP_FROM:-noreply@yourcompany.com}
      - WATCHTOWER_NOTIFICATION_EMAIL_TO=${ALERT_EMAIL:-ops@yourcompany.com}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER=${SMTP_HOST:-smtp.gmail.com}
      - WATCHTOWER_NOTIFICATION_EMAIL_SERVER_PORT=${SMTP_PORT:-587}
    networks:
      - app-network
    profiles:
      - monitoring
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
